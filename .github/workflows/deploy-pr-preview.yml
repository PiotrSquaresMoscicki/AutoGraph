name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pr-preview-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  build-and-deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/

      - name: Generate deployment marker
        run: |
          DEPLOY_MARKER="deploy-$(date +%s)-${{ github.sha }}"
          echo "$DEPLOY_MARKER" > ./dist/.deploy-marker
          echo "DEPLOY_MARKER=$DEPLOY_MARKER" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages (PR Preview)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: pr-preview/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Wait for deployment to be available
        run: |
          DEPLOY_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.pull_request.number }}/.deploy-marker"
          echo "Waiting for deployment to be available at: $DEPLOY_URL"
          echo "Expected marker: $DEPLOY_MARKER"
          
          MAX_ATTEMPTS=60
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" "$DEPLOY_URL" || echo "000")
            RESPONSE=$(cat /tmp/response.txt 2>/dev/null || echo "")
            
            if [ "$HTTP_CODE" = "200" ] && [ "$RESPONSE" = "$DEPLOY_MARKER" ]; then
              echo "✅ Deployment verified successfully!"
              exit 0
            fi
            
            echo "HTTP Status: $HTTP_CODE, Marker not yet available or mismatch. Waiting 5 seconds..."
            sleep 5
          done
          
          echo "❌ Deployment verification timed out after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const previewUrl = `https://${owner}.github.io/${repo}/pr-preview/pr-${prNumber}/`;
            
            // Check if comment already exists
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🚀 PR Preview deployed')
            );
            
            const commentBody = `🚀 **PR Preview deployed!**\n\nPreview URL: ${previewUrl}\n\n_This preview will be updated automatically when new commits are pushed._`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: commentBody
              });
            }
